name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (rapid pushes to a PR) to save runner minutes.
# Keyed by ref so a main push and a PR branch never cancel each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The live LLM test (*.live.test.ts) is excluded from `npm test` by vitest.config.ts,
# so CI never needs an API key and never hits the network.

jobs:
  lint:
    name: Lint + format + typecheck (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Test + build (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install ffmpeg (encoder dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm test
      - run: npm run build

  determinism:
    name: Cross-platform golden determinism (${{ matrix.os }})
    # The engine's core promise is byte-identical frames on every OS. Goldens are blessed on
    # Linux; this re-renders all of them on Windows too, so any platform-dependent drift (font
    # hinting, float→string formatting, path/child ordering) fails the build instead of shipping.
    # Pure render path only — no ffmpeg, no network — so it stays fast and hermetic.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Golden frames reproduce byte-for-byte + render path stays pure
        run: npx vitest run test/golden/golden.test.ts test/integration/purity.test.ts

  kokoro:
    name: Kokoro local TTS (real model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache the Kokoro model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kokoro-82m-v1-onnx-q8
      - name: Install deps (incl. the optional kokoro-js + onnxruntime)
        run: npm ci
      - name: Kokoro live test (downloads the ~86MB model on a cache miss, runs on CPU)
        # One retry: the HF model download flakes a few times a month (observed 2026-07-02).
        run: npm run test:kokoro || (echo 'retrying once after HF flake' && sleep 20 && npm run test:kokoro)
        env:
          RUN_KOKORO_LIVE: "1"
          KOKORO_DEVICE: cpu # CI runners have no GPU/CUDA runtime; go straight to CPU
          HF_HOME: ~/.cache/huggingface

  go:
    name: Lint + vet + test (Go gateway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: control-plane/go.mod
      - name: gofmt (check)
        run: test -z "$(gofmt -l .)" || (echo 'gofmt found unformatted files:' && gofmt -l . && exit 1)
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          working-directory: control-plane
      - run: go test ./...
      - run: go build ./...

  orchestrator:
    name: Test + build (Go orchestrator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: orchestrator/go.mod
      - name: Install ffmpeg (stitcher dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: gofmt (check)
        run: test -z "$(gofmt -l .)" || (echo 'gofmt found unformatted files:' && gofmt -l . && exit 1)
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          working-directory: orchestrator
          # Also lints the D1/D2 eval test files (tag-gated, so plain `go vet`/`test`
          # above skip them) — they're real code and shouldn't get a lint pass.
          args: --build-tags=e2e,e2e_live
      # -race matters here: the pipeline fans scenes out concurrently and the Director's
      # single-writer guarantee is mutex-enforced — the detector proves it.
      - run: go test -race ./...
      - run: go build ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install TS deps (for the real engine the eval boots)
        working-directory: .
        run: npm ci
      # Roadmap D1: boots the real engine (node --import tsx/esm worker.ts, the
      # production entrypoint) + drives the orchestrator's own HTTP surface with
      # offline tiers over a 6-topic suite — the smoke-eval of the whole binary
      # surface, without Docker. Gated behind the "e2e" build tag so it doesn't run
      # as part of the regular `go test ./...` above.
      - name: Offline e2e eval (D1)
        run: go test -tags e2e -run TestOfflineE2EEval -v -timeout 300s ./...
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orchestrator-eval-scorecards
          path: orchestrator/eval-scorecards.json
          if-no-files-found: warn

  images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [lint, test, determinism, go, orchestrator]
    steps:
      - uses: actions/checkout@v4
      - name: Build worker image
        run: docker build -t showman:ci .
      - name: Build gateway image
        run: docker build -t showman-gateway:ci ./control-plane
      - name: Build orchestrator image
        run: docker build -t showman-orchestrator:ci ./orchestrator
      - name: Build Kokoro worker image variant (Roadmap E4)
        run: docker build --build-arg INCLUDE_KOKORO=1 -t showman:ci-kokoro .

      # `docker build` succeeding only proves npm/apt didn't error — it does NOT
      # prove native deps are actually present and loadable. A prior version of
      # this Dockerfile used `--omit=optional`, which silently stripped canvas's
      # native binary (canvas ships one per platform as ITS OWN optionalDependency,
      # same convention as kokoro-js/onnxruntime) — the image built "successfully"
      # on every run while being completely unable to render anything, and nothing
      # in CI caught it. These checks run first: they fail in seconds with an exact
      # "which module, which image" message, before the slower boot+HTTP tests below.
      - name: Verify worker image native deps (canvas + ffmpeg)
        run: |
          docker run --rm showman:ci node -e "require('@napi-rs/canvas'); console.log('canvas: OK')"
          docker run --rm showman:ci ffmpeg -version | head -n1
      - name: Verify Kokoro variant has canvas AND kokoro-js/onnxruntime
        run: |
          docker run --rm showman:ci-kokoro node -e "require('@napi-rs/canvas'); console.log('canvas: OK')"
          docker run --rm showman:ci-kokoro node -e "require.resolve('kokoro-js'); console.log('kokoro-js: OK')"
          docker run --rm showman:ci-kokoro node -e "require.resolve('onnxruntime-node'); console.log('onnxruntime-node: OK')"
      - name: Verify the default image stays slim (no kokoro-js/onnxruntime leak)
        run: |
          docker run --rm showman:ci sh -c '[ ! -d node_modules/kokoro-js ] && [ ! -d node_modules/onnxruntime-node ]' \
            || (echo "kokoro-js/onnxruntime leaked into the default (non-Kokoro) image"; exit 1)

      # Full end-to-end smoke test: boot the real worker image and drive it exactly
      # like an external caller would — /healthz, /catalog, a /preview frame, and a
      # complete brief -> MP4 job through /v1/generate (the offline template author,
      # no API key needed) — then fetch the resulting object and verify it's a real,
      # playable MP4. This is the level of proof "docker build succeeded" can't give.
      - name: Smoke test worker image end to end
        run: |
          docker run -d --name smoke-worker -p 18080:8080 showman:ci
          trap 'docker logs smoke-worker; docker rm -f smoke-worker' EXIT

          for i in $(seq 1 15); do curl -sf http://localhost:18080/healthz && break; sleep 1; done
          curl -sf http://localhost:18080/healthz

          curl -sf http://localhost:18080/catalog -o /tmp/smoke-catalog.json
          test -s /tmp/smoke-catalog.json

          curl -sf -X POST http://localhost:18080/preview -H 'content-type: application/json' \
            -d '{"spec":{"specVersion":1,"width":64,"height":64,"fps":10,"duration":1,"seed":1,"background":"#ffffff","nodes":[{"id":"t","type":"text","x":10,"y":10,"text":"ok","fontSize":16,"fill":"#000000"}]},"frame":0}' \
            -o /tmp/smoke-preview.png
          test -s /tmp/smoke-preview.png
          head -c4 /tmp/smoke-preview.png | grep -aq PNG

          # Full round trip: a brief becomes a real MP4, no key needed (offline
          # template author). --max-time is generous — this actually renders frames
          # and runs ffmpeg, unlike everything else in this step.
          curl -sf -X POST http://localhost:18080/v1/generate -H 'content-type: application/json' \
            -d '{"brief":"count to three with stars"}' -o /tmp/smoke-generate.json --max-time 180
          VIDEO_KEY=$(jq -r '.video.key' /tmp/smoke-generate.json)
          DURATION=$(jq -r '.durationSec' /tmp/smoke-generate.json)
          HAS_AUDIO=$(jq -r '.hasAudio' /tmp/smoke-generate.json)
          test -n "$VIDEO_KEY" && [ "$VIDEO_KEY" != "null" ] || (echo "no video.key in /v1/generate response"; cat /tmp/smoke-generate.json; exit 1)
          echo "generated $VIDEO_KEY (${DURATION}s, hasAudio=${HAS_AUDIO})"

          curl -sf "http://localhost:18080/objects/${VIDEO_KEY}" -o /tmp/smoke-video.mp4
          test -s /tmp/smoke-video.mp4
          head -c8 /tmp/smoke-video.mp4 | tail -c4 | grep -aq ftyp || (echo "fetched object is not a valid MP4 (missing ftyp box)"; exit 1)

      # The gateway and orchestrator images were never actually BOOTED in CI before
      # today — only `docker build` was checked. A binary that builds but panics on
      # startup (bad ENTRYPOINT, missing env handling, etc.) would have passed CI.
      - name: Smoke test gateway image
        run: |
          docker run -d --name smoke-gateway -p 18082:8080 showman-gateway:ci
          trap 'docker logs smoke-gateway; docker rm -f smoke-gateway' EXIT
          for i in $(seq 1 10); do curl -sf http://localhost:18082/healthz && break; sleep 1; done
          curl -sf http://localhost:18082/healthz
      - name: Smoke test orchestrator image
        run: |
          docker run -d --name smoke-orchestrator -p 18091:8090 showman-orchestrator:ci
          trap 'docker logs smoke-orchestrator; docker rm -f smoke-orchestrator' EXIT
          for i in $(seq 1 10); do curl -sf http://localhost:18091/healthz && break; sleep 1; done
          curl -sf http://localhost:18091/healthz

  # Every check above tests ONE container in isolation. This is the actual "full e2e
  # in containers" test: bring up worker + orchestrator via the REAL docker-compose.yml
  # (same topology a real deployment uses — SHOWMAN_ENGINE_URL=http://worker:8080, a
  # shared volume for the final MP4), drive a job through the orchestrator's public
  # API, and verify the orchestrator container's own ffmpeg stitch step produced a
  # real, playable video on the shared volume. This is the one thing NOTHING else in
  # CI exercises: the orchestrator container actually calling the worker container
  # over the docker network, not an in-process Go test double (that's D1) or a single
  # container tested alone (the smoke tests above).
  compose-e2e:
    name: Full e2e across containers (docker compose)
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4
      - name: Bring up worker + orchestrator
        run: docker compose up -d --build worker orchestrator
      - name: Drive a real job through the orchestrator's public API
        run: |
          trap 'docker compose logs; docker compose down -v' EXIT

          for i in $(seq 1 30); do curl -sf http://localhost:8091/healthz && break; sleep 1; done
          curl -sf http://localhost:8091/healthz

          RESP=$(curl -sf -X POST http://localhost:8091/v1/generate -H 'content-type: application/json' \
            -d '{"topic":"counting","query":"count to three with stars"}')
          JOB_ID=$(echo "$RESP" | jq -r '.jobId')
          test -n "$JOB_ID" && [ "$JOB_ID" != "null" ] || (echo "no jobId in response: $RESP"; exit 1)
          echo "submitted $JOB_ID"

          STATUS=""
          for i in $(seq 1 60); do
            VIEW=$(curl -sf "http://localhost:8091/v1/jobs/${JOB_ID}")
            STATUS=$(echo "$VIEW" | jq -r '.status')
            echo "poll $i: $STATUS"
            [ "$STATUS" = "done" ] || [ "$STATUS" = "error" ] && break
            sleep 3
          done
          [ "$STATUS" = "done" ] || (echo "job did not finish: $VIEW"; exit 1)

          DURATION=$(echo "$VIEW" | jq -r '.result.durationSec')
          OFFSET_COUNT=$(echo "$VIEW" | jq -r '.result.sceneOffsets | length')
          VIDEO_KEY=$(echo "$VIEW" | jq -r '.result.videoKey')
          echo "done: ${DURATION}s across ${OFFSET_COUNT} scenes, video at ${VIDEO_KEY}"
          [ -n "$DURATION" ] && [ "$DURATION" != "0" ] && [ "$DURATION" != "null" ] || (echo "invalid duration: $DURATION"; exit 1)
          [ "$OFFSET_COUNT" -gt 0 ] || (echo "no scene offsets"; exit 1)

          # Verify the ACTUAL file the orchestrator's ffmpeg stitch step wrote to the
          # shared volume, not just that the HTTP call reported success.
          docker compose exec -T orchestrator sh -c "test -s '${VIDEO_KEY}'"
          docker compose exec -T orchestrator sh -c "head -c8 '${VIDEO_KEY}' | tail -c4" | grep -q ftyp \
            || (echo "video on the shared volume is not a valid MP4"; exit 1)

  # Roadmap E3: on a push to main (never on a PR — images only publish once code has
  # actually landed), build + push each image to GHCR under both its commit sha and
  # `:latest`. GITHUB_TOKEN already has registry access; packages: write is scoped to
  # just this job (least privilege), not the whole workflow.
  #
  # Multi-platform (linux/amd64 + linux/arm64, so it runs natively on Apple Silicon
  # too): buildx + QEMU emulation build both, pushed as one manifest list per tag —
  # `docker pull` on either architecture resolves to the matching image automatically.
  publish:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs: images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jacobtdang/showman:${{ github.sha }}
            ghcr.io/jacobtdang/showman:latest
      - name: Build + push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./control-plane
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jacobtdang/showman-gateway:${{ github.sha }}
            ghcr.io/jacobtdang/showman-gateway:latest
      - name: Build + push orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jacobtdang/showman-orchestrator:${{ github.sha }}
            ghcr.io/jacobtdang/showman-orchestrator:latest
