name: CI

on:
  push:
    branches: [main]
  pull_request:

# The live LLM test (*.live.test.ts) is excluded from `npm test` by vitest.config.ts,
# so CI never needs an API key and never hits the network.

jobs:
  lint:
    name: Lint + format + typecheck (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Test + build (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install ffmpeg (encoder dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm test
      - run: npm run build

  go:
    name: Lint + vet + test (Go gateway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: control-plane/go.mod
      - name: gofmt (check)
        run: test -z "$(gofmt -l .)" || (echo 'gofmt found unformatted files:' && gofmt -l . && exit 1)
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          working-directory: control-plane
      - run: go test ./...
      - run: go build ./...

  images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [lint, test, go]
    steps:
      - uses: actions/checkout@v4
      - name: Build worker image
        run: docker build -t showman:ci .
      - name: Build gateway image
        run: docker build -t showman-gateway:ci ./control-plane
