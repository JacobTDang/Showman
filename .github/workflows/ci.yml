name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (rapid pushes to a PR) to save runner minutes.
# Keyed by ref so a main push and a PR branch never cancel each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The live LLM test (*.live.test.ts) is excluded from `npm test` by vitest.config.ts,
# so CI never needs an API key and never hits the network.

jobs:
  lint:
    name: Lint + format + typecheck (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Test + build (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install ffmpeg (encoder dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm test
      - run: npm run build

  determinism:
    name: Cross-platform golden determinism (${{ matrix.os }})
    # The engine's core promise is byte-identical frames on every OS. Goldens are blessed on
    # Linux; this re-renders all of them on Windows too, so any platform-dependent drift (font
    # hinting, float→string formatting, path/child ordering) fails the build instead of shipping.
    # Pure render path only — no ffmpeg, no network — so it stays fast and hermetic.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Golden frames reproduce byte-for-byte + render path stays pure
        run: npx vitest run test/golden/golden.test.ts test/integration/purity.test.ts

  kokoro:
    name: Kokoro local TTS (real model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache the Kokoro model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kokoro-82m-v1-onnx-q8
      - name: Install deps (incl. the optional kokoro-js + onnxruntime)
        run: npm ci
      - name: Kokoro live test (downloads the ~86MB model on a cache miss, runs on CPU)
        # One retry: the HF model download flakes a few times a month (observed 2026-07-02).
        run: npm run test:kokoro || (echo 'retrying once after HF flake' && sleep 20 && npm run test:kokoro)
        env:
          RUN_KOKORO_LIVE: "1"
          KOKORO_DEVICE: cpu # CI runners have no GPU/CUDA runtime; go straight to CPU
          HF_HOME: ~/.cache/huggingface

  go:
    name: Lint + vet + test (Go gateway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: control-plane/go.mod
      - name: gofmt (check)
        run: test -z "$(gofmt -l .)" || (echo 'gofmt found unformatted files:' && gofmt -l . && exit 1)
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          working-directory: control-plane
      - run: go test ./...
      - run: go build ./...

  orchestrator:
    name: Test + build (Go orchestrator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: orchestrator/go.mod
      - name: Install ffmpeg (stitcher dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: gofmt (check)
        run: test -z "$(gofmt -l .)" || (echo 'gofmt found unformatted files:' && gofmt -l . && exit 1)
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          working-directory: orchestrator
          # Also lints the D1/D2 eval test files (tag-gated, so plain `go vet`/`test`
          # above skip them) — they're real code and shouldn't get a lint pass.
          args: --build-tags=e2e,e2e_live
      # -race matters here: the pipeline fans scenes out concurrently and the Director's
      # single-writer guarantee is mutex-enforced — the detector proves it.
      - run: go test -race ./...
      - run: go build ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install TS deps (for the real engine the eval boots)
        working-directory: .
        run: npm ci
      # Roadmap D1: boots the real engine (node --import tsx/esm worker.ts, the
      # production entrypoint) + drives the orchestrator's own HTTP surface with
      # offline tiers over a 6-topic suite — the smoke-eval of the whole binary
      # surface, without Docker. Gated behind the "e2e" build tag so it doesn't run
      # as part of the regular `go test ./...` above.
      - name: Offline e2e eval (D1)
        run: go test -tags e2e -run TestOfflineE2EEval -v -timeout 300s ./...
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orchestrator-eval-scorecards
          path: orchestrator/eval-scorecards.json
          if-no-files-found: warn

  images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [lint, test, determinism, go, orchestrator]
    steps:
      - uses: actions/checkout@v4
      - name: Build worker image
        run: docker build -t showman:ci .
      - name: Build gateway image
        run: docker build -t showman-gateway:ci ./control-plane
      - name: Build orchestrator image
        run: docker build -t showman-orchestrator:ci ./orchestrator
      - name: Build Kokoro worker image variant (Roadmap E4)
        run: docker build --build-arg INCLUDE_KOKORO=1 -t showman:ci-kokoro .
      # Smoke test: actually BOOT the worker image and render a frame through it.
      # `docker build` succeeding only proves npm/apt didn't error — it does NOT
      # prove @napi-rs/canvas's native binary is actually present and loadable.
      # A prior version of this Dockerfile used `--omit=optional`, which silently
      # stripped canvas's native binary (canvas ships one per platform as ITS OWN
      # optionalDependency) alongside kokoro-js — the image built "successfully"
      # on every run while being completely unable to render anything. This step
      # would have caught that on the very first PR.
      - name: Smoke test worker image (canvas must actually render)
        run: |
          docker run -d --name smoke-worker -p 18080:8080 showman:ci
          for i in $(seq 1 15); do curl -sf http://localhost:18080/healthz && break; sleep 1; done
          curl -sf http://localhost:18080/healthz || (docker logs smoke-worker; exit 1)
          curl -sf -X POST http://localhost:18080/preview -H 'content-type: application/json' \
            -d '{"spec":{"specVersion":1,"width":64,"height":64,"fps":10,"duration":1,"seed":1,"background":"#ffffff","nodes":[{"id":"t","type":"text","x":10,"y":10,"text":"ok","fontSize":16,"fill":"#000000"}]},"frame":0}' \
            -o /tmp/smoke-preview.png || (docker logs smoke-worker; exit 1)
          test -s /tmp/smoke-preview.png || (echo "preview response was empty"; docker logs smoke-worker; exit 1)
          head -c4 /tmp/smoke-preview.png | grep -aq PNG || (echo "response is not a PNG"; docker logs smoke-worker; exit 1)
          docker rm -f smoke-worker

  # Roadmap E3: on a push to main (never on a PR — images only publish once code has
  # actually landed), build + push each image to GHCR under both its commit sha and
  # `:latest`. GITHUB_TOKEN already has registry access; packages: write is scoped to
  # just this job (least privilege), not the whole workflow.
  #
  # Multi-platform (linux/amd64 + linux/arm64, so it runs natively on Apple Silicon
  # too): buildx + QEMU emulation build both, pushed as one manifest list per tag —
  # `docker pull` on either architecture resolves to the matching image automatically.
  publish:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs: images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jacobtdang/showman:${{ github.sha }}
            ghcr.io/jacobtdang/showman:latest
      - name: Build + push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./control-plane
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jacobtdang/showman-gateway:${{ github.sha }}
            ghcr.io/jacobtdang/showman-gateway:latest
      - name: Build + push orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jacobtdang/showman-orchestrator:${{ github.sha }}
            ghcr.io/jacobtdang/showman-orchestrator:latest
