name: CI

on:
  push:
    branches: [main]
  pull_request:

# The live LLM test (*.live.test.ts) is excluded from `npm test` by vitest.config.ts,
# so CI never needs an API key and never hits the network.

jobs:
  lint:
    name: Lint + format + typecheck (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Test + build (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install ffmpeg (encoder dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm test
      - run: npm run build

  kokoro:
    name: Kokoro local TTS (real model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache the Kokoro model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kokoro-82m-v1-onnx-q8
      - name: Install deps (incl. the optional kokoro-js + onnxruntime)
        run: npm ci
      - name: Kokoro live test (downloads the ~86MB model on a cache miss, runs on CPU)
        run: npm run test:kokoro
        env:
          RUN_KOKORO_LIVE: "1"
          KOKORO_DEVICE: cpu # CI runners have no GPU/CUDA runtime; go straight to CPU
          HF_HOME: ~/.cache/huggingface

  go:
    name: Lint + vet + test (Go gateway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: control-plane/go.mod
      - name: gofmt (check)
        run: test -z "$(gofmt -l .)" || (echo 'gofmt found unformatted files:' && gofmt -l . && exit 1)
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          working-directory: control-plane
      - run: go test ./...
      - run: go build ./...

  images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [lint, test, go]
    steps:
      - uses: actions/checkout@v4
      - name: Build worker image
        run: docker build -t showman:ci .
      - name: Build gateway image
        run: docker build -t showman-gateway:ci ./control-plane
